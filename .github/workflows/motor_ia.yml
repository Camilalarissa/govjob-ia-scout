name: Robô IA Scout (Vagas de Física)

on:
  schedule:
    # Executa todos os dias às 09:00 UTC (06:00 no Brasil)
    - cron: "0 9 * * *"
  workflow_dispatch: # Permite que você clique num botão para rodar manualmente a qualquer momento

jobs:
  procurar_vagas:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Versão estável do Python

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 supabase google-genai python-dotenv

      - name: Executar Motor IA Scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python motor_ia_scout.py
